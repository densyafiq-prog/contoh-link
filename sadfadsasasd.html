<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ADIDAS SAMBA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .card h2 {
      margin: 10px 0;
    }

    .price {
      color: #e91e63;
      font-size: 20px;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 10px 20px;
      background-color: #e91e63;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #2e11d1;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="IMG_2023.jpg">
    <h2>Outfit Kekinian</h2>
    <p class="price">Rp 199.000</p>
    <p>Stylish & nyaman dipakai sehari-hari!</p>
    <a href="#" class="btn">Lihat Outfit
    </a>
  </div>

</body>
</html>}
